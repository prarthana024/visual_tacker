<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f0f11"/>
<title>My Day</title>
<link rel="manifest" id="manifest-placeholder"/>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f4;
    --muted: #8888a0;
    --hint: #55556a;
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; overscroll-behavior: none; }
  body { padding-bottom: env(safe-area-inset-bottom); }

  /* Layout */
  .app { max-width: 430px; margin: 0 auto; padding: 0 16px 100px; }
  .header { padding: 54px 0 20px; display: flex; align-items: flex-end; justify-content: space-between; }
  .header-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header-date { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .add-fab { width: 42px; height: 42px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* Donut summary */
  .summary { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
  .donut-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
  .donut-wrap svg { width: 90px; height: 90px; }
  .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .donut-center .dh { font-size: 16px; font-weight: 700; }
  .donut-center .dl { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .stats-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; }
  .stat-val { font-size: 17px; font-weight: 700; }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* Progress bar */
  .day-prog { margin-bottom: 20px; }
  .day-prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .prog-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 2px; background: #7F77DD; transition: width 0.4s; }

  /* Section header */
  .section-hdr { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

  /* Task cards */
  .task-list { display: flex; flex-direction: column; gap: 10px; }
  .task-card { background: var(--surface); border-radius: var(--radius); padding: 14px; border: 1px solid transparent; transition: border-color 0.15s; }
  .task-card.done { opacity: 0.6; }
  .task-card:active { opacity: 0.8; }
  .task-top { display: flex; align-items: center; gap: 12px; }
  .task-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .task-info { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-name.done-name { text-decoration: line-through; color: var(--muted); }
  .task-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .task-right { display: flex; align-items: center; gap: 6px; }
  .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .badge-done { background: rgba(29,158,117,0.18); color: #5DCAA5; }
  .badge-partial { background: rgba(186,117,23,0.18); color: #EF9F27; }
  .badge-none { background: var(--surface2); color: var(--muted); }
  .ib { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .ib:active { color: var(--text); background: var(--surface2); }
  .task-prog-row { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
  .task-prog-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .task-prog-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .task-prog-pct { font-size: 11px; color: var(--muted); min-width: 28px; text-align: right; }
  .prog-btns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .pb { font-size: 11px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); cursor: pointer; }
  .pb:active { background: var(--border2); }
  .pb.pb-active { background: rgba(29,158,117,0.18); color: #5DCAA5; border-color: rgba(29,158,117,0.35); }
  .pb.pb-done { background: rgba(29,158,117,0.18); color: #5DCAA5; border-color: rgba(29,158,117,0.35); }

  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; z-index: 100; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); width: 100%; max-width: 430px; margin: 0 auto; }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .fld { margin-bottom: 14px; }
  .fld label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .fld input, .fld select { width: 100%; padding: 11px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 15px; appearance: none; }
  .fld input:focus, .fld select:focus { outline: none; border-color: #7F77DD; }
  .trow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .crow { display: flex; gap: 8px; flex-wrap: wrap; }
  .csw { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: border-color 0.15s; }
  .csw.act { border-color: #fff; }
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-row input[type=range] { flex: 1; accent-color: #7F77DD; }
  .range-val { font-size: 13px; color: var(--text); min-width: 32px; text-align: right; }
  .macts { display: flex; gap: 10px; margin-top: 18px; }
  .bcnl { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); font-size: 15px; cursor: pointer; }
  .bsav { flex: 2; padding: 13px; border-radius: var(--radius-sm); border: none; background: #7F77DD; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
  .bsav:active { opacity: 0.85; }
  .del-btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none; background: rgba(226,75,74,0.15); color: #F09595; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">My day</div>
      <div class="header-date" id="hdr-date"></div>
    </div>
    <button class="add-fab" onclick="openModal()" aria-label="Add task">+</button>
  </div>

  <div class="summary">
    <div class="donut-wrap">
      <svg id="donut" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="donut-center"><div class="dh" id="used-h">0h</div><div class="dl">of 24h</div></div>
    </div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">tasks</div></div>
      <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">completed</div></div>
      <div class="stat"><div class="stat-val" id="s-pct">0%</div><div class="stat-lbl">day done</div></div>
      <div class="stat"><div class="stat-val" id="s-free">24h</div><div class="stat-lbl">free</div></div>
    </div>
  </div>

  <div class="day-prog">
    <div class="day-prog-label"><span>Overall progress</span><span id="ovr-pct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="ovr-fill" style="width:0%"></div></div>
  </div>

  <div class="section-hdr">Schedule</div>
  <div class="task-list" id="task-list"></div>
</div>

<div id="modal-root"></div>

<script>
const COLORS=['#7F77DD','#1D9E75','#D85A30','#378ADD','#D4537E','#BA7517','#639922','#E24B4A','#0C8599','#888780'];
const STORAGE_KEY='dayplanner_tasks_v1';

function loadTasks(){
  try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):null}catch(e){return null}
}
function saveTasks(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks))}catch(e){}
}

let tasks=loadTasks()||[
  {id:1,name:'Sleep',start:'23:00',end:'07:00',color:'#888780',progress:100},
  {id:2,name:'Morning routine',start:'07:00',end:'08:00',color:'#1D9E75',progress:100},
  {id:3,name:'Deep work',start:'09:00',end:'12:00',color:'#7F77DD',progress:50},
  {id:4,name:'Lunch break',start:'12:00',end:'13:00',color:'#BA7517',progress:0},
  {id:5,name:'Meetings',start:'13:00',end:'15:00',color:'#378ADD',progress:0},
];

let editId=null,selColor=COLORS[0];

function t2m(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function dur(s,e){let d=t2m(e)-t2m(s);if(d<0)d+=1440;return d}
function fmtD(m){const h=Math.floor(m/60),mn=m%60;return mn?`${h}h ${mn}m`:`${h}h`}
function fmtT(t){const[h,m]=t.split(':').map(Number);const ap=h>=12?'pm':'am';const hh=h%12||12;return m?`${hh}:${String(m).padStart(2,'0')}${ap}`:`${hh}${ap}`}
function hex2rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}

function renderDonut(){
  const svg=document.getElementById('donut');
  const total=1440,cx=45,cy=45,R=40,r=29;
  let paths=`<circle cx="${cx}" cy="${cy}" r="${(R+r)/2}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="${R-r}"/>`;
  let totalUsed=0;
  [...tasks].sort((a,b)=>t2m(a.start)-t2m(b.start)).forEach(t=>{
    const d=dur(t.start,t.end);totalUsed+=d;
    const p=t.progress/100;
    const sA=(t2m(t.start)/total)*2*Math.PI-Math.PI/2;
    const eA=(t2m(t.start)/total+d/total)*2*Math.PI-Math.PI/2;
    const large=d/total>0.5?1:0;
    const x1=cx+R*Math.cos(sA),y1=cy+R*Math.sin(sA);
    const x2=cx+R*Math.cos(eA),y2=cy+R*Math.sin(eA);
    const ix1=cx+r*Math.cos(eA),iy1=cy+r*Math.sin(eA);
    const ix2=cx+r*Math.cos(sA),iy2=cy+r*Math.sin(sA);
    paths+=`<path d="M${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${ix1},${iy1} A${r},${r} 0 ${large},0 ${ix2},${iy2} Z" fill="${hex2rgba(t.color,0.22)}"/>`;
    if(p>0){
      const midA=sA+(eA-sA)*p;
      const lf=d/total>0.5&&p>0.5?1:0;
      if(p>=1){
        paths+=`<path d="M${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${ix1},${iy1} A${r},${r} 0 ${large},0 ${ix2},${iy2} Z" fill="${t.color}"/>`;
      } else {
        const mx2=cx+R*Math.cos(midA),my2=cy+R*Math.sin(midA);
        const mix1=cx+r*Math.cos(midA),miy1=cy+r*Math.sin(midA);
        paths+=`<path d="M${x1},${y1} A${R},${R} 0 ${lf},1 ${mx2},${my2} L${mix1},${miy1} A${r},${r} 0 ${lf},0 ${ix2},${iy2} Z" fill="${t.color}"/>`;
      }
    }
  });
  svg.innerHTML=paths;
  const doneTasks=tasks.filter(t=>t.progress===100).length;
  const totalW=tasks.reduce((a,t)=>a+dur(t.start,t.end),0);
  const doneW=tasks.reduce((a,t)=>a+dur(t.start,t.end)*(t.progress/100),0);
  const pct=totalW?Math.round(doneW/totalW*100):0;
  const freeMins=Math.max(0,1440-totalUsed);
  document.getElementById('used-h').textContent=fmtD(totalUsed);
  document.getElementById('s-total').textContent=tasks.length;
  document.getElementById('s-done').textContent=doneTasks;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('s-free').textContent=fmtD(freeMins);
  document.getElementById('ovr-pct').textContent=pct+'%';
  document.getElementById('ovr-fill').style.width=pct+'%';
}

function renderTasks(){
  const list=document.getElementById('task-list');
  if(!tasks.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🗓</div><div class="empty-text">No tasks yet.<br>Tap + to add your first.</div></div>`;
    return;
  }
  list.innerHTML='';
  [...tasks].sort((a,b)=>t2m(a.start)-t2m(b.start)).forEach(t=>{
    const d=dur(t.start,t.end);
    const isDone=t.progress===100;
    const badgeCls=isDone?'badge-done':t.progress>0?'badge-partial':'badge-none';
    const badgeTxt=isDone?'Done':t.progress>0?t.progress+'%':'Todo';
    const card=document.createElement('div');
    card.className='task-card'+(isDone?' done':'');
    card.innerHTML=`
      <div class="task-top">
        <div class="task-color-dot" style="background:${t.color}"></div>
        <div class="task-info">
          <div class="task-name${isDone?' done-name':''}">${t.name}</div>
          <div class="task-meta">${fmtT(t.start)} – ${fmtT(t.end)} &middot; ${fmtD(d)}</div>
        </div>
        <div class="task-right">
          <div class="status-badge ${badgeCls}">${badgeTxt}</div>
          <button class="ib" onclick="editTask(${t.id})" aria-label="Edit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
      </div>
      <div class="task-prog-row">
        <div class="task-prog-track"><div class="task-prog-fill" style="width:${t.progress}%;background:${t.color}"></div></div>
        <span class="task-prog-pct">${t.progress}%</span>
      </div>
      <div class="prog-btns">
        <button class="pb${t.progress===0?' pb-active':''}" onclick="setP(${t.id},0)">Not started</button>
        <button class="pb${t.progress===25?' pb-active':''}" onclick="setP(${t.id},25)">25%</button>
        <button class="pb${t.progress===50?' pb-active':''}" onclick="setP(${t.id},50)">Half done</button>
        <button class="pb${t.progress===75?' pb-active':''}" onclick="setP(${t.id},75)">75%</button>
        <button class="pb pb-done${t.progress===100?' pb-active':''}" onclick="setP(${t.id},100)">✓ Done</button>
      </div>`;
    list.appendChild(card);
  });
}

function render(){renderDonut();renderTasks();saveTasks()}

function setP(id,p){const t=tasks.find(x=>x.id===id);if(t){t.progress=p;render()}}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);closeModal();render()}
function editTask(id){openModal(id)}

function buildColorRow(containerId){
  const row=document.getElementById(containerId);if(!row)return;
  row.innerHTML='';
  COLORS.forEach(c=>{
    const s=document.createElement('div');
    s.className='csw'+(c===selColor?' act':'');
    s.style.background=c;
    s.onclick=()=>{selColor=c;buildColorRow(containerId)};
    row.appendChild(s);
  });
}

function openModal(id){
  editId=id||null;
  const t=id?tasks.find(x=>x.id===id):null;
  selColor=t?t.color:COLORS[tasks.length%COLORS.length];
  const isEdit=!!t;
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-backdrop" onclick="handleBackdrop(event)">
      <div class="modal">
        <div class="modal-handle"></div>
        <h3>${isEdit?'Edit task':'New task'}</h3>
        <div class="fld"><label>Task name</label><input type="text" id="inp-n" placeholder="e.g. Exercise" value="${t?t.name:''}"/></div>
        <div class="trow">
          <div class="fld"><label>Start time</label><input type="time" id="inp-s" value="${t?t.start:'09:00'}"/></div>
          <div class="fld"><label>End time</label><input type="time" id="inp-e" value="${t?t.end:'10:00'}"/></div>
        </div>
        ${isEdit?`<div class="fld"><label>Progress — <span id="pv-lbl">${t.progress}%</span></label><div class="range-row"><input type="range" id="inp-p" min="0" max="100" step="5" value="${t.progress}" oninput="document.getElementById('pv-lbl').textContent=this.value+'%'"/></div></div>`:''}
        <div class="fld"><label>Color</label><div class="crow" id="cr"></div></div>
        <div class="macts">
          <button class="bcnl" onclick="closeModal()">Cancel</button>
          <button class="bsav" onclick="saveTask()">Save</button>
        </div>
        ${isEdit?`<button class="del-btn" onclick="deleteTask(${t.id})">Delete task</button>`:''}
      </div>
    </div>`;
  buildColorRow('cr');
  setTimeout(()=>{const n=document.getElementById('inp-n');if(n){n.focus();n.select()}},80);
}

function handleBackdrop(e){if(e.target===e.currentTarget)closeModal()}
function closeModal(){document.getElementById('modal-root').innerHTML=''}

function saveTask(){
  const name=(document.getElementById('inp-n').value||'').trim();
  const start=document.getElementById('inp-s').value;
  const end=document.getElementById('inp-e').value;
  if(!name)return;
  const pp=document.getElementById('inp-p');
  const progress=pp?parseInt(pp.value):0;
  if(editId){
    const t=tasks.find(x=>x.id===editId);
    t.name=name;t.start=start;t.end=end;t.color=selColor;t.progress=progress;
  } else {
    tasks.push({id:Date.now(),name,start,end,color:selColor,progress:0});
  }
  closeModal();render();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now=new Date();
document.getElementById('hdr-date').textContent=`${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

render();
</script>
</body>
</html>
